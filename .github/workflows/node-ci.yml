name: Node CI/CD - InvenTrack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Check Backend for Errors
        working-directory: ./backend
        run: node --check server.js && echo "✅ No syntax errors found"

      - name: Verify Project Structure
        run: |
          test -f backend/server.js && echo "✅ server.js found"
          test -f backend/db.js     && echo "✅ db.js found"
          test -f frontend/src/App.js && echo "✅ App.js found"

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          chmod +x node_modules/.bin/react-scripts
          npm run build
        env:
          CI: false